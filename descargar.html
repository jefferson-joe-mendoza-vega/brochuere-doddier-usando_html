<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dossier Intay Corporation - Portada</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-dark: #040812;
            --orange-brand: #FF6600;
            --steel-blue: #1C2D42;
        }

        body { 
            background-color: #f3f4f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 0;
            font-family: 'Inter', sans-serif;
        }

        /* Contenedor A4 Exacto */
        #render-area {
            width: 794px;
            height: 1123px;
            background-color: var(--bg-dark);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
        }

        .industrial-grid {
            background-image: 
                linear-gradient(rgba(255, 102, 0, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 102, 0, 0.04) 1px, transparent 1px);
            background-size: 25px 25px;
            height: 100%;
        }

        .steel-triangle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 60%;
            height: 45%;
            background-color: var(--steel-blue);
            clip-path: polygon(100% 0, 100% 100%, 0 100%);
            opacity: 0.8;
            z-index: 1;
        }

        .font-title { font-family: 'Oswald', sans-serif; }

        /* Botón de descarga */
        #btn-pdf {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--orange-brand);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 1000;
            cursor: pointer;
            border: none;
            box-shadow: 0 10px 20px rgba(255, 102, 0, 0.3);
        }
    </style>
</head>
<body>

    <button id="btn-pdf" onclick="descargar()">DESCARGAR PORTADA PDF</button>

    <div id="render-area">
        <div class="industrial-grid relative">
            
            <div class="absolute top-0 left-0 w-full h-2 bg-[#FF6600] z-30"></div>

            <div class="absolute top-12 left-10 z-30">
                <img src="logo.jpeg" alt="INTAY" class="w-64 h-auto object-contain">
            </div>

            <div class="absolute top-[40%] left-1/2 -translate-x-1/2 -translate-y-1/2 z-20 w-[550px] h-[350px] border-4 border-white/10 shadow-2xl rounded-lg overflow-hidden">
                <img src="imagenes/portada/image.png" alt="Obra" class="w-full h-full object-cover">
            </div>

            <div class="steel-triangle"></div>

            <div class="absolute bottom-20 left-12 z-30 max-w-[80%]">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-12 h-[2px] bg-[#FF6600]"></div>
                    <h3 class="text-[#FF6600] text-sm font-semibold tracking-[0.4em] uppercase">Dossier Corporativo 2025</h3>
                </div>

                <h1 class="font-title text-[5rem] text-white leading-[0.9] mb-8 uppercase">
                    Estructuras Metálicas<br>
                    <span class="text-gray-400">De</span> <span class="text-[#FF6600]">Alta Ingeniería</span>
                </h1>

                <div class="flex gap-4">
                    <div class="border border-[#FF6600] bg-[#FF6600]/10 px-6 py-2">
                        <span class="text-white text-xs font-bold tracking-widest uppercase">Soldadores 3G · 4G · 6G</span>
                    </div>
                    <div class="border border-white/20 bg-white/5 px-6 py-2">
                        <span class="text-white text-xs font-bold tracking-widest uppercase">Empresa Cajabambina</span>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-20 right-12 z-30 flex flex-col items-end">
                <div class="text-[#FF6600] font-title text-9xl font-bold leading-none mb-4">+5</div>
                <div class="flex flex-col items-end text-white font-title text-4xl opacity-50">
                    <div>3G</div>
                    <div class="opacity-70">4G</div>
                    <div class="text-[#FF6600] opacity-100">6G</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function descargar() {
            const element = document.getElementById('render-area');
            const opt = {
                margin: 0,
                filename: 'Portada_Intay_2025.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true }, // Escala alta para nitidez
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
