<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dossier Intay Corporation - PDF Ready</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-dark: #040812;
            --orange-brand: #FF6600;
            --steel-blue: #1C2D42;
        }

        body { 
            background-color: #f3f4f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
            font-family: 'Inter', sans-serif;
        }

        .font-title { font-family: 'Oswald', sans-serif; }

        /* Contenedor exacto A4 (210mm x 297mm) */
        #dossier-page {
            width: 794px; /* Pixeles equivalentes a A4 a 96dpi */
            height: 1123px;
            background-color: var(--bg-dark);
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .industrial-grid {
            background-image: 
                linear-gradient(rgba(255, 102, 0, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 102, 0, 0.04) 1px, transparent 1px);
            background-size: 25px 25px;
            height: 100%;
            width: 100%;
        }

        .steel-triangle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 65%;
            height: 48%;
            background-color: var(--steel-blue);
            clip-path: polygon(100% 0, 100% 100%, 0 100%);
            opacity: 0.9;
            z-index: 1;
        }

        /* Botón de descarga flotante */
        #download-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--orange-brand);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 10px 25px rgba(255, 102, 0, 0.4);
            border: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #download-btn:hover {
            transform: scale(1.05) translateY(-2px);
            background-color: #e65c00;
            box-shadow: 0 15px 30px rgba(255, 102, 0, 0.5);
        }

        #download-btn:active {
            transform: scale(0.95);
        }

        /* Ajustes para la exportación perfecta */
        .pdf-fix {
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
    </style>
</head>
<body>

    <button id="download-btn" onclick="generatePDF()">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        Descargar Dossier PDF
    </button>

    <div id="dossier-page" class="pdf-fix">
        <div class="industrial-grid relative">
            
            <div class="absolute top-0 left-0 w-full h-2 bg-[#FF6600] z-20"></div>

            <div class="absolute top-16 left-12 z-20">
                <div class="bg-white p-4 flex flex-col items-center justify-center shadow-xl border-l-4 border-[#FF6600]">
                    <span class="font-title text-black text-2xl font-bold leading-none">INTAY</span>
                    <span class="text-[8px] font-bold text-gray-500 tracking-[0.2em] uppercase">Corporation</span>
                </div>
            </div>

            <div class="steel-triangle"></div>

            <div class="absolute bottom-20 left-12 z-20 max-w-[75%]">
                <div class="flex items-center gap-4 mb-8">
                    <div class="w-16 h-[2px] bg-[#FF6600]"></div>
                    <h3 class="text-[#FF6600] text-sm font-bold tracking-[0.4em] uppercase">Dossier Corporativo 2025</h3>
                </div>

                <h1 class="font-title text-[5.2rem] text-white leading-[0.9] mb-8 uppercase tracking-tighter">
                    Estructuras Metálicas<br>
                    <span class="text-gray-400">De</span> <span class="text-[#FF6600]">Alta Ingeniería</span>
                </h1>

                <p class="text-white/50 text-xl max-w-lg mb-12 font-light leading-relaxed">
                    Soluciones integrales de soldadura, fabricación y montaje industrial bajo los más estrictos estándares de calidad.
                </p>

                <div class="flex flex-wrap gap-4">
                    <div class="border border-[#FF6600] bg-[#FF6600]/10 px-6 py-3">
                        <span class="text-white text-xs font-bold tracking-widest uppercase italic">Soldadores 3G · 4G · 6G</span>
                    </div>
                    <div class="border border-white/20 bg-white/5 px-6 py-3">
                        <span class="text-white text-xs font-bold tracking-widest uppercase italic">Empresa Cajabambina</span>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-20 right-12 z-20 flex flex-col items-end">
                <div class="text-[#FF6600] font-title text-[9rem] leading-none font-bold mb-4 drop-shadow-2xl">+5</div>
                <div class="flex flex-col items-end space-y-[-0.3rem] border-r-4 border-[#FF6600] pr-4">
                    <div class="text-white font-title text-4xl font-bold tracking-widest opacity-40">3G</div>
                    <div class="text-white font-title text-4xl font-bold tracking-widest opacity-70">4G</div>
                    <div class="text-[#FF6600] font-title text-4xl font-bold tracking-widest">6G</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function generatePDF() {
            const element = document.getElementById('dossier-page');
            const btn = document.getElementById('download-btn');
            
            // Cambiar texto del botón mientras procesa
            btn.innerHTML = "Procesando...";
            btn.style.opacity = "0.7";

            const opt = {
                margin: 0,
                filename: 'Dossier_Intay_Corporation_2025.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { 
                    scale: 3, // Mayor escala = mayor nitidez
                    useCORS: true,
                    letterRendering: true
                },
                jsPDF: { 
                    unit: 'mm', 
                    format: 'a4', 
                    orientation: 'portrait' 
                }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Descargar Dossier PDF
                `;
                btn.style.opacity = "1";
            });
        }
    </script>

</body>
</html>
