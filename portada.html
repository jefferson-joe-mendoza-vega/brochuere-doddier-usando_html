<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dossier Intay Corporation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* Paleta de colores exactos */
        :root {
            --bg-dark: #040812;      /* Azul marino casi negro */
            --orange-brand: #FF6600; /* Naranja industrial */
            --steel-blue: #1C2D42;   /* Azul acero */
        }

        body { 
            background-color: #f3f4f6; /* Fondo gris para resaltar la página */
            display: flex;
            justify-content: center;
            padding: 2rem;
            font-family: 'Inter', sans-serif;
        }

        .font-title { font-family: 'Oswald', sans-serif; }

        /* Cuadrícula de papel milimetrado tenue */
        .industrial-grid {
            background-color: #2a3a48;
            background-image: 
                linear-gradient(rgba(255, 102, 0, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 102, 0, 0.04) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        /* Triángulo azul acero de profundidad */
        .steel-triangle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 60%;
            height: 45%;
            background-color: var(--steel-blue);
            clip-path: polygon(100% 0, 100% 100%, 0 100%);
            opacity: 0.8;
            z-index: 1;
        }

        /* Forma del logo (Octágono) */
        .octagon {
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
        }

        /* Elementos decorativos geométricos */
        .logo-decoration {
            position: absolute;
            border: 2px solid rgba(255, 102, 0, 0.3);
            border-radius: 50%;
        }

        .decoration-ring-1 {
            width: 420px;
            height: 420px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: spin 30s linear infinite reverse;
        }

        .decoration-ring-2 {
            width: 500px;
            height: 500px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(255, 102, 0, 0.2);
            animation: spin 40s linear infinite;
        }

        .decoration-corner-top-left {
            width: 120px;
            height: 120px;
            border-right: 3px solid var(--orange-brand);
            border-bottom: 3px solid var(--orange-brand);
            opacity: 0.4;
        }

        .decoration-corner-bottom-right {
            width: 80px;
            height: 80px;
            border-left: 3px solid var(--orange-brand);
            border-top: 3px solid var(--orange-brand);
            opacity: 0.4;
        }

        @keyframes spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="relative w-full max-w-[794px] aspect-[1/1.414] industrial-grid shadow-2xl overflow-hidden border border-gray-800">
        
        <div class="absolute top-0 left-0 w-full h-2 bg-[#FF6600] z-20"></div>

        <div class="absolute -top-20 left-0 flex items-center justify-center gap-4 z-20" style="width: 400px; height: 400px;">
            <!-- Anillos decorativos giratorios -->
            <div class="logo-decoration decoration-ring-1"></div>
            <div class="logo-decoration decoration-ring-2"></div>
            
            <!-- Logo central -->
            <img src="logo.jpeg" alt="INTAY CORPORATION" class="w-80 h-80 object-contain absolute z-30 drop-shadow-2xl">
            

            <!-- Esquina decorativa superior izquierda -->
            <div class="decoration-corner-top-left absolute -top-4 -left-4"></div>
            
            <!-- Esquina decorativa inferior derecha -->
            <div class="decoration-corner-bottom-right absolute -bottom-4 -right-4"></div>
        </div>

        <div class="absolute top-1/3 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-20 w-[500px] h-[300px]">
            <img src="imagenes/portada/image.png" alt="Trabajo en construcción" class="w-full h-full object-cover rounded-lg shadow-2xl">
        </div>

        <div class="steel-triangle"></div>

        <div class="absolute bottom-16 left-10 z-20 max-w-[80%]">
            
            <div class="flex items-center gap-3 mb-6">
                <div class="w-12 h-[2px] bg-[#FF6600]"></div>
                <h3 class="text-[#FF6600] text-sm font-semibold tracking-[0.3em] uppercase">Dossier Corporativo 2026</h3>
            </div>

            <h1 class="font-title text-[4.5rem] text-white leading-[0.95] mb-6 uppercase tracking-tight">
                Estructuras Metálicas<br>
                <span class="text-gray-300">De</span> <span class="text-[#FF6600]">Alta Ingeniería</span>
            </h1>

            <p class="text-white/60 text-lg max-w-lg mb-10 font-light leading-relaxed">
                Soluciones integrales de soldadura, fabricación y montaje industrial con los más altos estándares de calidad y seguridad para el sector minero.
            </p>

            <div class="flex flex-wrap gap-4">
                <div class="border border-[#FF6600] bg-[#FF6600]/10 px-5 py-2">
                    <span class="text-white text-xs font-semibold tracking-widest uppercase">Personal Calificado</span>
                </div>
                <div class="border border-[#FF6600] bg-[#FF6600]/10 px-5 py-2">
                    <span class="text-white text-xs font-semibold tracking-widest uppercase">Empresa Cajabambina</span>
                </div>
                <div class="border border-[#FF6600] bg-[#FF6600]/10 px-5 py-2">
                    <span class="text-white text-xs font-semibold tracking-widest uppercase">3 Años de Experiencia</span>
                </div>
            </div>
        </div>

        <div class="absolute bottom-16 right-10 z-20 flex flex-col items-end">
            <div class="text-[#FF6600] font-title text-8xl font-bold leading-none">
                +3
            </div>
            <div class="text-white text-xs font-semibold tracking-widest uppercase mt-2">Años de<br>Experiencia</div>
        </div>

    </div>

</body>
</html>
